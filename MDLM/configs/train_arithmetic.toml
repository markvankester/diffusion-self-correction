# Default training config for `uv run MDLM/train_mdlm.py`.

task = "arithmetic"                                         # arithmetic or sudoku

# Data and paths
data_path = "data/arithmetic_train.jsonl"                   # Training dataset path.
eval_data_path = "data/arithmetic_eval.jsonl"               # Evaluation dataset path.
output_dir = "./checkpoints/arithmetic/test3"               # Directory for checkpoints and trainer outputs.
tokenizer_id = "./tokenizers/arithmetic_char_tokenizer"     # Arithmetic tokenizer path or Hugging Face tokenizer ID.
limit_data = 0                                              # Number of rows to load; use 0 for the full dataset.
mask_until_token = "="                                      # Optional: set labels to -100 for all tokens up to and including this token.

# Model architecture
d_model = 192                               # Transformer hidden size.
n_heads = 6                                 # Number of attention heads.
n_layers = 6                                # Number of transformer blocks.
mlp_ratio = 2                               # Feed-forward expansion ratio.
seq_len = 20                                # Sequence length used during training.

# Advanced architecture defaults
block_type = "llama"                        # Transformer block implementation: "sequential", "parallel", or "llama".
layer_norm_type = "rms"                     # Layer norm implementation. 
activation_type = "swiglu"                  # Activation used by the generic MLP path; the llama block uses fixed SiLU gating.
init_fn = "mitchell"                        # Weight initialization scheme.
attention_dropout = 0.1                    
residual_dropout = 0.1                     
embedding_dropout = 0.1                    

# Optimization
batch_size = 128
grad_accum = 2
lr = 3e-4
lr_scheduler_type = "constant_with_warmup"      # Options: "linear", "cosine", "constant", "constant_with_warmup", "cosine_with_restarts", "polynomial", "inverse_sqrt".
weight_decay = 0.05
max_steps = 40000                               
warmup_steps = 500                              

# Diffusion loss
loss_weight_type = "scheduler"               # Options: "uniform", "scheduler".
loss_norm_type = "token"                     # Options: "token", "sequence", "batch".
time_epsilon = 1e-3                          # Lower bound for sampled diffusion timesteps.

# Evaluation
eval_strategy = "epoch"                      # Evaluation strategy: "no", "steps", "epoch".
eval_steps = 500                             

# Logging and Checkpointing
logging_steps = 10
save_steps = 20000

# Reporting
run_name = "mdlm-arithmetic-test"
report_to = "wandb"                          # Options: "none", "wandb".
