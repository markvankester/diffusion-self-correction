# PRISM fine-tuning config for Sudoku.

task = "sudoku"  # Options: "arithmetic", "sudoku"

# Data and paths
checkpoint = "./checkpoints/sudoku/baseline/Run 2/checkpoint-200000"
data_path = "data/sudoku-train-data.npy"
output_dir = "./checkpoints/sudoku/prism"
limit_data = 0
eval_fraction = 0.05

# PRISM adapter
prism_head_type = "linear"          # Options: "linear", "scalar", "attention"

# PRISM objective
prism_lambda = 5                    # Loss weighting coefficient for PRISM quality head
prism_k = 4                         # Unmasking candidate set size

# Optimization
batch_size = 256
grad_accum = 1
lr = 3e-4
max_steps = 200000
warmup_steps = 1000

# Evaluation
eval_steps = 1000

# Reporting
run_name = "prism-sudoku"
