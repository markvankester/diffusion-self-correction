# BackPlay correction-head training config for Sudoku.

task = "sudoku"  # Options: "arithmetic", "sudoku"

# Data and paths
checkpoint = "./checkpoints/sudoku/baseline/Run 2/checkpoint-200000"
data_path = "data/sudoku-train-data.npy"
output_dir = "./checkpoints/sudoku/backplay"
limit_data = 0
eval_fraction = 0.05

# BackPlay adapter
backplay_delta_t = 0.0625                         # Rollback step size (e.g. 0.0625 = 1/16, 0.03125 = 1/32)
backplay_loss_scope = "non_mask"                  # Options: "non_mask", "artifact", "all"

# Optimization
batch_size = 256
grad_accum = 1
lr = 3e-4
max_steps = 50000
warmup_steps = 1000

# Evaluation
eval_steps = 1000

# Reporting
run_name = "backplay-sudoku"
