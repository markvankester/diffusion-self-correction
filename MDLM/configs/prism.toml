# PRISM fine-tuning config for `uv run MDLM/train_prism.py`.

task = "arithmetic"                                 # arithmetic or sudoku

# Data and paths
checkpoint = "./checkpoints/arithmetic/test2"       # Pretrained MDM checkpoint to fine-tune from.
data_path = "data/arithmetic_train.jsonl"           # Training dataset path.
eval_data_path = "data/arithmetic_eval.jsonl"       # Evaluation dataset path.
output_dir = "./checkpoints/arithmetic/prism"       # Where to save PRISM-finetuned checkpoints.
limit_data = 0                                      # Number of rows to load; use 0 for the full dataset.
mask_until_token = "="                              # Optional: set labels to -100 for all tokens up to and including this token.

# PRISM adapter
prism_head_type = "linear"                          # "scalar", "linear", or "attention".
prism_head_n_heads = 4                              # Only used for the attention head.
prism_head_dropout = 0.1                            # Only used for the attention head.

# PRISM objective
prism_lambda = 5                                    # Weight for MDM regularization loss.
prism_k = 5                                         # Number of masked tokens to unmask per sample.
prism_freeze_unmasking_head = true                  # Match the paper: do not update the unmasking head during PRISM fine-tuning.

# Optimization
batch_size = 64                                    
grad_accum = 4                                     
lr = 5e-3                                           
lr_scheduler_type = "linear"                        # Options: "linear", "cosine", "constant", "constant_with_warmup", "cosine_with_restarts", "polynomial", "inverse_sqrt".
weight_decay = 0.1                                  
max_steps = 10000                                   
warmup_steps = 100                                  

# Evaluation
eval_strategy = "epoch"                             # Evaluation strategy: "no", "steps", "epoch".
eval_steps = 10000                                   

# Logging and Checkpointing
save_steps = 5000                                   
logging_steps = 10                                  

# Reporting
run_name = "prism-arithmetic"
report_to = "none"                                  # Options: "none", "wandb", 
