# Config for training RemeDi starting from a pretrained sudoku checkpoint.

task = "sudoku"                                             # arithmetic or sudoku

# Data and paths
checkpoint = "./checkpoints/sudoku/baseline/Run 2/checkpoint-200000"
data_path = "data/sudoku-train-data.npy"
output_dir = "./checkpoints/sudoku/remedi"                  # Directory for checkpoints and trainer outputs.
limit_data = 0                                              # Number of rows to load; use 0 for the full dataset.
eval_fraction = 0.05                                        # Reserve 5% of training boards for eval tracking.

# RemeDi specific arguments
lambda_ups = 1.0                            # BCE loss weight for the unmasking policy stream.
r_incorrect = 0.1                           # Ratio of corrupted tokens during SFT.

# Optimization
batch_size = 256
grad_accum = 1
lr = 3e-4
lr_scheduler_type = "constant_with_warmup"      # Options: "linear", "cosine", "constant", "constant_with_warmup", "cosine_with_restarts", "polynomial", "inverse_sqrt".
weight_decay = 0.05
max_steps = 200000
warmup_steps = 2000

# Diffusion loss
loss_weight_type = "scheduler"               # Options: "uniform", "scheduler".
loss_norm_type = "token"                     # Options: "token", "sequence", "batch".
time_epsilon = 1e-3                          # Lower bound for sampled diffusion timesteps.

# Evaluation
eval_strategy = "steps"                      # Evaluation strategy: "no", "steps", "epoch".
eval_steps = 1000

# Logging and Checkpointing
logging_steps = 10
save_steps = 50000

# Reporting
run_name = "remedi-sudoku"
report_to = "none"                           # Disable wandb by default for testing/stability.
