# PRISM fine-tuning config for arithmetic.

task = "arithmetic"  # Options: "arithmetic", "sudoku"

# Data and paths
checkpoint = "./checkpoints/arithmetic/final2/checkpoint-250000"
data_path = "data/arithmetic_train.jsonl"
eval_data_path = "data/arithmetic_eval.jsonl"
output_dir = "./checkpoints/arithmetic/prism"
limit_data = 0
mask_until_token = "="

# PRISM adapter
prism_head_type = "linear"          # Options: "linear", "scalar", "attention"

# PRISM objective
prism_lambda = 5                    # Loss weighting coefficient for PRISM quality head
prism_k = 4                         # Unmasking candidate set size

# Optimization
batch_size = 256
grad_accum = 1
lr = 3e-4
max_steps = 400000
warmup_steps = 2000

# Evaluation
eval_steps = 1000

# Reporting
run_name = "prism-arithmetic"
